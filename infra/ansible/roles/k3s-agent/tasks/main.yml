---
- name: Read k3s token from local
  set_fact:
    k3s_token: "{{ lookup('file', '/tmp/k3s_token') }}"

- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s_install.sh
    mode: 0755

- name: Install k3s agent and join cluster (async, reboot aware)
  shell:
    cmd: /tmp/k3s_install.sh
    creates: /usr/local/bin/k3s
  environment:
    K3S_URL: "https://{{ hostvars['master']['ansible_private_ip'] }}:6443"
    K3S_TOKEN: "{{ k3s_token }}"
    INSTALL_K3S_EXEC: "--node-ip {{ ansible_private_ip }}"
  async: 300
  poll: 0
  ignore_errors: yes
  register: install_result

- name: Wait for worker to become reachable again
  wait_for_connection:
    delay: 10
    timeout: 120

- name: Ensure k3s-agent service is running
  systemd:
    name: k3s-agent
    state: started
    enabled: yes
